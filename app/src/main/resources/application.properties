spring.application.name=controlefinancas
spring.datasource.url=jdbc:sqlserver://${DB_HOST}.database.windows.net:1433;database=${DB_DATABASE_NAME};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
security.jwt.secret-key=${SECRET_KEY}
security.jwt.issuer=${ISSUER}
spring.main.allow-circular-references=true
#verificar esse circular references
